<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPO Tracker - 新股/可转债一站查询</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
               background: #f5f5f5; padding-bottom: 80px; }
        
        .header { background: linear-gradient(135deg, #1a1a2e, #16213e); 
                  color: white; padding: 20px; text-align: center; }
        .header h1 { font-size: 24px; margin-bottom: 5px; }
        .header p { font-size: 12px; opacity: 0.7; }
        
        .tabs { display: flex; background: white; position: sticky; top: 0; z-index: 100;
                overflow-x: auto; border-bottom: 1px solid #eee; }
        .tab { flex: 1; min-width: 80px; padding: 15px 10px; text-align: center; 
               font-size: 13px; cursor: pointer; border-bottom: 2px solid transparent; }
        .tab.active { color: #1890ff; border-bottom-color: #1890ff; font-weight: 600; }
        
        .content { padding: 15px; }
        
        .card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px;
                box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .card-header { display: flex; justify-content: space-between; align-items: center;
                       margin-bottom: 12px; }
        .card-title { font-size: 16px; font-weight: 600; color: #333; }
        .card-tag { font-size: 11px; padding: 3px 8px; border-radius: 4px; }
        .tag-red { background: #fff1f0; color: #f5222d; }
        .tag-green { background: #f6ffed; color: #52c41a; }
        .tag-blue { background: #e6f7ff; color: #1890ff; }
        
        .card-row { display: flex; justify-content: space-between; padding: 8px 0;
                    border-bottom: 1px solid #f0f0f0; }
        .card-row:last-child { border-bottom: none; }
        .card-label { color: #666; font-size: 13px; }
        .card-value { color: #333; font-size: 13px; font-weight: 500; }
        
        .loading { text-align: center; padding: 40px; color: #999; }
        .empty { text-align: center; padding: 40px; color: #999; }
        
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white;
                      display: flex; border-top: 1px solid #eee; padding: 8px 0; }
        .nav-item { flex: 1; text-align: center; font-size: 11px; color: #666; cursor: pointer; }
        .nav-item.active { color: #1890ff; }
        .nav-icon { font-size: 20px; margin-bottom: 2px; }
        
        .refresh-btn { position: fixed; right: 20px; bottom: 90px; width: 44px; height: 44px;
                       background: #1890ff; border-radius: 50%; color: white; display: flex;
                       align-items: center; justify-content: center; font-size: 20px;
                       box-shadow: 0 4px 12px rgba(24,144,255,0.4); cursor: pointer; }
        
        /* 日历样式 */
        .cal-container { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px;
                         box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .cal-header h3 { font-size: 16px; font-weight: 600; color: #333; }
        .cal-nav { display: flex; gap: 8px; }
        .cal-nav button { background: #f0f0f0; border: none; padding: 6px 12px; border-radius: 6px;
                          cursor: pointer; font-size: 13px; color: #333; }
        .cal-nav button:hover { background: #e0e0e0; }
        .cal-legend { display: flex; gap: 16px; margin-bottom: 12px; font-size: 11px; color: #999; }
        .cal-legend span { display: flex; align-items: center; gap: 4px; }
        .cal-legend .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .dot-subscribe { background: #f5222d; }
        .dot-listing { background: #52c41a; }
        .cal-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center;
                        font-size: 11px; color: #999; padding: 8px 0; border-bottom: 1px solid #f0f0f0; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
        .cal-day { text-align: center; padding: 8px 4px; border-radius: 8px; cursor: pointer;
                   font-size: 13px; color: #333; min-height: 52px; position: relative; }
        .cal-day:hover { background: #f5f5f5; }
        .cal-day.today { background: #e6f7ff; font-weight: 600; }
        .cal-day.other-month { color: #ccc; }
        .cal-day.selected { background: #1890ff; color: white; }
        .cal-dots { display: flex; flex-direction: column; align-items: center; gap: 2px; margin-top: 2px; }
        .cal-dot { width: 6px; height: 6px; border-radius: 50%; }
        .cal-dot-red { background: #f5222d; }
        .cal-dot-green { background: #52c41a; }
        .cal-dot-blue { background: #1890ff; }
        .cal-dot-orange { background: #fa8c16; }
        
        /* 日历详情面板 */
        .cal-detail { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px;
                      box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .cal-detail-title { font-size: 14px; font-weight: 600; color: #333; margin-bottom: 10px;
                            padding-bottom: 8px; border-bottom: 1px solid #f0f0f0; }
        .cal-detail-item { display: flex; justify-content: space-between; padding: 8px 0;
                           border-bottom: 1px solid #f5f5f5; font-size: 13px; }
        .cal-detail-item:last-child { border-bottom: none; }
        .cal-detail-name { color: #333; font-weight: 500; }
        .cal-detail-tag { font-size: 11px; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>📈 IPO Tracker</h1>
        <p>新股 · 可转债 · REITs 一站查询</p>
    </div>
    
    <div class="tabs" id="tabs">
        <div class="tab active" data-type="calendar">日历</div>
        <div class="tab" data-type="cbond">可转债</div>
        <div class="tab" data-type="china">A股</div>
        <div class="tab" data-type="hk">港股</div>
        <div class="tab" data-type="us">美股</div>
        <div class="tab" data-type="reits">REITs</div>
    </div>
    
    <div class="content" id="content">
        <div class="loading">加载中...</div>
    </div>
    
    <div class="refresh-btn" onclick="loadData()">↻</div>
    
    <div class="bottom-nav">
        <div class="nav-item active" data-page="home">
            <div class="nav-icon">🏠</div>
            <div>首页</div>
        </div>
        <div class="nav-item" data-page="calendar">
            <div class="nav-icon">📅</div>
            <div>日历</div>
        </div>
        <div class="nav-item" data-page="settings">
            <div class="nav-icon">⚙️</div>
            <div>设置</div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        let currentType = 'calendar';
        let calendarData = null;
        const _now = new Date();
        let calYear = _now.getFullYear(), calMonth = _now.getMonth();
        let selectedDate = `${_now.getFullYear()}-${String(_now.getMonth()+1).padStart(2,'0')}-${String(_now.getDate()).padStart(2,'0')}`;
        
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentType = tab.dataset.type;
                if (currentType === 'calendar') {
                    if (!calendarData) loadCalendarData(); else renderCalendarView();
                } else {
                    loadData();
                }
            });
        });
        
        async function loadData() {
            const content = document.getElementById('content');
            content.innerHTML = '<div class="loading">加载中...</div>';
            try {
                let url, renderFn;
                switch(currentType) {
                    case 'cbond': url=`${API_BASE}/api/cb/new`; renderFn=renderCBond; break;
                    case 'china': url=`${API_BASE}/api/ipo/china`; renderFn=renderChina; break;
                    case 'hk': url=`${API_BASE}/api/ipo/hk`; renderFn=renderHK; break;
                    case 'us': url=`${API_BASE}/api/ipo/us`; renderFn=renderUS; break;
                    case 'reits': url=`${API_BASE}/api/reits/new`; renderFn=renderREITs; break;
                }
                const res = await fetch(url);
                const json = await res.json();
                content.innerHTML = renderFn(json.data || json);
            } catch(e) {
                content.innerHTML = `<div class="empty">连接失败<br>${e.message}</div>`;
            }
        }
        
        async function loadCalendarData() {
            const content = document.getElementById('content');
            content.innerHTML = '<div class="loading">加载日历...</div>';
            try {
                const [chinaRes, cbRes, hkRes] = await Promise.all([
                    fetch(`${API_BASE}/api/ipo/china?days=120`).then(r=>r.json()),
                    fetch(`${API_BASE}/api/cb/new?days=120`).then(r=>r.json()),
                    fetch(`${API_BASE}/api/ipo/hk?days=120`).then(r=>r.json()),
                ]);
                calendarData = {};
                (chinaRes.data||[]).forEach(item => {
                    const sub = item.apply_date || item.online_issue_date;
                    const list = item.listing_date;
                    if (sub && sub.length>=10) {
                        if (!calendarData[sub]) calendarData[sub]={subscribe:[],listing:[]};
                        calendarData[sub].subscribe.push({name:item.name,market:item.market||'A股',type:'ipo'});
                    }
                    if (list && list.length>=10) {
                        if (!calendarData[list]) calendarData[list]={subscribe:[],listing:[]};
                        calendarData[list].listing.push({name:item.name,market:item.market||'A股',type:'ipo'});
                    }
                });
                (cbRes.data||[]).forEach(item => {
                    const sub = item.value_date;
                    const list = item.listing_date;
                    if (sub && sub.length>=10) {
                        if (!calendarData[sub]) calendarData[sub]={subscribe:[],listing:[]};
                        calendarData[sub].subscribe.push({name:item.name,market:'可转债',type:'cb'});
                    }
                    if (list && list.length>=10) {
                        if (!calendarData[list]) calendarData[list]={subscribe:[],listing:[]};
                        calendarData[list].listing.push({name:item.name,market:'可转债',type:'cb'});
                    }
                });
                (hkRes.data||[]).forEach(item => {
                    const sub = item.apply_date;
                    const list = item.listing_date;
                    if (sub && sub.length>=10) {
                        if (!calendarData[sub]) calendarData[sub]={subscribe:[],listing:[]};
                        calendarData[sub].subscribe.push({name:item.name,market:'港股',type:'hk'});
                    }
                    if (list && list.length>=10) {
                        if (!calendarData[list]) calendarData[list]={subscribe:[],listing:[]};
                        calendarData[list].listing.push({name:item.name,market:'港股',type:'hk'});
                    }
                });
                renderCalendarView();
            } catch(e) {
                content.innerHTML = `<div class="empty">加载失败<br>${e.message}</div>`;
            }
        }
        
        function renderCalendarView() {
            const content = document.getElementById('content');
            const now = new Date();
            const monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
            const weekdays = ['一','二','三','四','五','六','日'];
            const firstDay = new Date(calYear,calMonth,1);
            const lastDay = new Date(calYear,calMonth+1,0);
            let startDow = firstDay.getDay()-1; if(startDow<0) startDow=6;
            const prevLast = new Date(calYear,calMonth,0).getDate();
            let days = [];
            for (let i=startDow-1;i>=0;i--) days.push({day:prevLast-i,other:true,date:null});
            for (let d=1;d<=lastDay.getDate();d++) {
                const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const isToday=(calYear===now.getFullYear()&&calMonth===now.getMonth()&&d===now.getDate());
                const info=calendarData?calendarData[ds]:null;
                days.push({day:d,date:ds,today:isToday,info});
            }
            const remain=7-(days.length%7);
            if(remain<7) for(let d=1;d<=remain;d++) days.push({day:d,other:true,date:null});
            
            let html = `<div class="cal-container">
                <div class="cal-header">
                    <div class="cal-nav"><button onclick="changeMonth(-1)">&lt;</button></div>
                    <h3>${calYear}年${monthNames[calMonth]}</h3>
                    <div class="cal-nav"><button onclick="changeMonth(1)">&gt;</button></div>
                </div>
                <div class="cal-legend">
                    <span><i class="dot dot-subscribe"></i> 申购</span>
                    <span><i class="dot dot-listing"></i> 上市</span>
                </div>
                <div class="cal-weekdays">${weekdays.map(w=>`<div>${w}</div>`).join('')}</div>
                <div class="cal-grid">${days.map(d=>{
                    const cls=['cal-day',d.other?'other-month':'',d.today?'today':'',(selectedDate&&d.date===selectedDate)?'selected':''].filter(Boolean).join(' ');
                    let dots='';
                    if(d.info){
                        dots='<div class="cal-dots">';
                        dots+=d.info.subscribe.length>0?'<div class="cal-dot cal-dot-red"></div>':'<div class="cal-dot" style="opacity:0"></div>';
                        dots+=d.info.listing.length>0?'<div class="cal-dot cal-dot-green"></div>':'<div class="cal-dot" style="opacity:0"></div>';
                        dots+='</div>';
                    }
                    const click=d.date?`onclick="selectDate('${d.date}')"`:'';
                    return `<div class="${cls}" ${click}>${d.day}${dots}</div>`;
                }).join('')}</div>
            </div>`;
            
            if(selectedDate&&calendarData&&calendarData[selectedDate]){
                const info=calendarData[selectedDate];
                html+=`<div class="cal-detail"><div class="cal-detail-title">${selectedDate}</div>`;
                if(info.subscribe.length>0){
                    html+=`<div style="font-size:12px;color:#f5222d;font-weight:600;margin-bottom:6px">🔴 申购</div>`;
                    info.subscribe.forEach(item=>{
                        const tBg=item.type==='cb'?'#fff1f0':(item.market==='北交所'?'#fff3e0':'#f6ffed');
                        const tC=item.type==='cb'?'#f5222d':(item.market==='北交所'?'#e65100':'#52c41a');
                        const bj=item.market==='北交所'?' <span style="color:#e65100;font-size:11px">（北交所）</span>':'';
                        html+=`<div class="cal-detail-item"><span class="cal-detail-name">${item.name}${bj}</span><span class="cal-detail-tag" style="background:${tBg};color:${tC}">${item.market}</span></div>`;
                    });
                }
                if(info.listing.length>0){
                    html+=`<div style="font-size:12px;color:#52c41a;font-weight:600;margin:${info.subscribe.length>0?'10':'0'}px 0 6px">🟢 上市</div>`;
                    info.listing.forEach(item=>{
                        const tBg=item.type==='cb'?'#fff1f0':(item.market==='北交所'?'#fff3e0':'#f6ffed');
                        const tC=item.type==='cb'?'#f5222d':(item.market==='北交所'?'#e65100':'#52c41a');
                        const bj=item.market==='北交所'?' <span style="color:#e65100;font-size:11px">（北交所）</span>':'';
                        html+=`<div class="cal-detail-item"><span class="cal-detail-name">${item.name}${bj}</span><span class="cal-detail-tag" style="background:${tBg};color:${tC}">${item.market}</span></div>`;
                    });
                }
                html+='</div>';
            }
            content.innerHTML=html;
        }
        
        function changeMonth(delta){
            calMonth+=delta;
            if(calMonth<0){calMonth=11;calYear--;}
            if(calMonth>11){calMonth=0;calYear++;}
            selectedDate=null;
            renderCalendarView();
        }
        
        function selectDate(ds){
            selectedDate=selectedDate===ds?null:ds;
            renderCalendarView();
        }
        
        function renderCBond(data) {
            if(!data||!data.length) return '<div class="empty">暂无可转债</div>';
            data=[...data].sort((a,b)=>(b.listing_date||'').localeCompare(a.listing_date||''));
            return data.map(item=>`<div class="card"><div class="card-header"><span class="card-title">${item.name}</span><span class="card-tag tag-red">可转债</span></div><div class="card-row"><span class="card-label">正股</span><span class="card-value">${item.stock_name}</span></div><div class="card-row"><span class="card-label">转股价</span><span class="card-value">${item.price}元</span></div><div class="card-row"><span class="card-label">发行规模</span><span class="card-value">${item.size}亿</span></div><div class="card-row"><span class="card-label">评级</span><span class="card-value">${item.rating}</span></div><div class="card-row"><span class="card-label">溢价率</span><span class="card-value">${item.premium}%</span></div><div class="card-row"><span class="card-label">上市日期</span><span class="card-value">${item.listing_date}</span></div></div>`).join('');
        }
        
        function renderChina(data) {
            if(!data||!data.length) return '<div class="empty">暂无A股新股</div>';
            data=[...data].sort((a,b)=>(b.listing_date||b.apply_date||'').localeCompare(a.listing_date||a.apply_date||''));
            return data.map(item=>{
                const isBj=item.market==='北交所';
                const tagStyle=isBj?'style="background:#fff3e0;color:#e65100"':'class="card-tag tag-green"';
                const tagText=isBj?'北交所':'A股';
                const nameSuffix=isBj?' <span style="color:#e65100;font-size:11px">（北交所）</span>':'';
                return `<div class="card"><div class="card-header"><span class="card-title">${item.name}${nameSuffix}</span><span ${tagStyle}>${tagText}</span></div><div class="card-row"><span class="card-label">代码</span><span class="card-value">${item.ts_code}</span></div><div class="card-row"><span class="card-label">发行价</span><span class="card-value">${item.price}元</span></div><div class="card-row"><span class="card-label">市盈率</span><span class="card-value">${item.pe}倍</span></div><div class="card-row"><span class="card-label">募资</span><span class="card-value">${item.amount}亿</span></div><div class="card-row"><span class="card-label">申购日期</span><span class="card-value">${item.apply_date||item.online_issue_date}</span></div><div class="card-row"><span class="card-label">上市日期</span><span class="card-value">${item.listing_date}</span></div></div>`;
            }).join('');
        }
        
        function renderHK(data) {
            if(!data||!data.length) return '<div class="empty">暂无港股新股</div>';
            data=[...data].sort((a,b)=>(b.listing_date||b.apply_date||'').localeCompare(a.listing_date||a.apply_date||''));
            return data.map(item=>`<div class="card"><div class="card-header"><span class="card-title">${item.name}</span><span class="card-tag tag-blue">港股</span></div><div class="card-row"><span class="card-label">代码</span><span class="card-value">${item.code}</span></div><div class="card-row"><span class="card-label">招股价</span><span class="card-value">${item.price||'-'}港元</span></div><div class="card-row"><span class="card-label">招股日期</span><span class="card-value">${item.apply_date||'-'}</span></div><div class="card-row"><span class="card-label">上市日期</span><span class="card-value">${item.listing_date||'-'}</span></div><div class="card-row"><span class="card-label">募资</span><span class="card-value">${item.funds||'-'}</span></div></div>`).join('');
        }
        
        function renderUS(data) {
            if(!data||!data.length) return '<div class="empty">暂无美股新股</div>';
            data=[...data].sort((a,b)=>(b.ipo_date||'').localeCompare(a.ipo_date||''));
            return data.map(item=>`<div class="card"><div class="card-header"><span class="card-title">${item.name}</span><span class="card-tag" style="background:#f3e5f5;color:#7b1fa2">美股</span></div><div class="card-row"><span class="card-label">代码</span><span class="card-value">${item.symbol}</span></div><div class="card-row"><span class="card-label">发行价</span><span class="card-value">$${item.price}</span></div><div class="card-row"><span class="card-label">预期上市</span><span class="card-value">${item.ipo_date||'-'}</span></div></div>`).join('');
        }
        
        function renderREITs(data) {
            if(!data||!data.length) return '<div class="empty">暂无REITs</div>';
            return data.map(item=>{
                const changeVal=parseFloat(item.change_pct)||0;
                const changeColor=changeVal>0?'#f5222d':(changeVal<0?'#52c41a':'#999');
                const changeText=changeVal>0?`+${item.change_pct}%`:`${item.change_pct}%`;
                return `<div class="card"><div class="card-header"><span class="card-title">${item.name}</span><span class="card-tag" style="background:#e0f2f1;color:#00695c">REITs</span></div><div class="card-row"><span class="card-label">代码</span><span class="card-value">${item.code}</span></div>${item.price?`<div class="card-row"><span class="card-label">最新价</span><span class="card-value">${item.price}元</span></div>`:''}${item.change_pct!==''&&item.change_pct!==undefined?`<div class="card-row"><span class="card-label">涨跌幅</span><span class="card-value" style="color:${changeColor}">${changeText}</span></div>`:''}</div>`;
            }).join('');
        }
        
        loadCalendarData();
    </script>
</body>
</html>
